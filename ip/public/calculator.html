<!DOCTYPE html>

<html>

<head>
    
        
     <link rel="stylesheet" href="output.css">
</head>

<body class="font-sans bg-[#f0f0f0] flex justify-center  items-center h-[100vh]">
    <div class="calculator bg-[#fff] border-2 rounded-xl shadow-xl shadow-[rgba(0,0,0,0.1)] p-[20px] w-[300px] text-center ">
        <h1 class="text-xl mb-[20px]">TypeScript Calculator</h1>
        <input type="text" id="display" class=" w-[100%] h-[50px] text-3xl text-right p-[10px] border-2 border-[#ccc] mb-[20px] bg-[#f9f9f9] rounded-lg"  disabled />
        <div id="buttons" class="grid grid-cols-4 gap-2.5 ">
            <button class="number btn ">1</button>
            <button class="number  btn">2</button>
            <button class="number  btn">3</button>
            <button class="operator btn bg-[#f1f1f1]">+</button>
            <button class="number  btn">4</button>
            <button class="number btn">5</button>
            <button class="number  btn">6</button>
            <button class="operator  btn   bg-[#f1f1f1]">-</button>
            <button class="number  btn">7</button>
            <button class="number  btn">8</button>
            <button class="number  btn">9</button>
            <button class="operator  btn bg-[#f1f1f1]">*</button>
            <button class="number  btn">0</button>
            <button class="clear  btn bg-[#ff4d4d] text-white hover:bg-[#ff3333]">C</button>
            <button class="equals  btn bg-[#4CAF50] text-white col-span-2 hover:bg-[#45a049]">=</button>
            <button class="operator  btn bg-[#f1f1f1]">/</button>
        </div>
    </div>



    <script src="./tsdist/calculator.js"></script>
</body>

</html>
