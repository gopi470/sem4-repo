<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSN College of Engineering </title>
    <link rel="stylesheet" href="output.css">
    <link rel="icon" href="Images/snn-logo.png">
    

</head>

<body>

    <div class="flex border-2 border-white-500 relative items-center " >
        <img src="Images/snn-logo.png" alt="ssn" class="p-2">
        <button class="bg-orange-400  w-[7em] h-10 absolute right-16 rounded-[7px]">Admissions</button>
        <img src="Images/hamberger-icon.svg" alt="menu" class="h-10 absolute right-0">
    </div>

    <div class=" overflow-hidden w-full" >
        <img src="Images/ssn-fountain.jpg" alt="ssn" class="h-[100vh] w-full">
        <button class="bg-black  w-[17em] h-full float-right text-center pt-3 pb-3 rounded-lg mt-2 mr-1  text-blue-400">Go to SSN School Of Engineering -SNUC</button>
        <div class="p-3 bg-orange-400 text-[20px] leading-[34px] font-bold">SSN College of Engineering is no longer accepting applications. Please apply for similar programs to the <mark class="text-blue-500 font-bold bg-inherit"><b> School of
        Engineering </b></mark> at Shiv Nadar University Chennai (SNUC).
        
        </div>
    </div>

    <div>
        <div class="p-3 bg-blue-400 text-[24px] leading-[34px] font-bold text-white w-52 float-left">News Update</div>
        <div class="p-3 bg-blue-700 text-[20px] leading-[34px] font-bold text-white " id="news"> null</div>
        <div class="bg-blue-500 flex flex-row justify-around h-fit ">
           <div class="  bg-blue-300 w-40 h-[7em] rounded-xl m-5 flex flex-col justify-center items-center hover:bg-blue-400">
             <img src="Images/scholarship-SSN.png" alt="ssn" class="h-16 w-16  hover:h-20 hover:w-20">
             <button class="text-[20px] font-bold">Scholarship</button>
            
            </div>

            <div class="  bg-blue-300 w-40 h-[7em] rounded-xl m-5 flex flex-col justify-center items-center hover:bg-blue-400">
                <img src="Images/business.png" alt="ssn" class="h-16 w-16  hover:h-20 hover:w-20">
                <button class="text-[20px] font-bold">Placement</button>
            
            </div>
            <div class="  bg-blue-300 w-40 h-[7em] rounded-xl m-5 flex flex-col justify-center items-center hover:bg-blue-400">
                <img src="Images/event-ssn.png" alt="ssn" class="h-16 w-16  hover:h-20 hover:w-20">
                <button class="text-[20px] font-bold">Events</button>
            
            </div>

            <div class="  bg-blue-300 w-40 h-[7em] rounded-xl m-5 flex flex-col justify-center items-center hover:bg-blue-400">
                <img src="Images/Life-at-SSN-1.png" alt="ssn" class="h-16 w-16  hover:h-20 hover:w-20">
                <button class="text-[20px] font-bold">Life at SSN</button>
            
            </div>

            <div class="  bg-blue-300 w-40 h-[7em] rounded-xl m-5 flex flex-col justify-center items-center hover:bg-blue-400">
                <img src="Images/tennis.png" alt="ssn" class="h-16 w-16  hover:h-20 hover:w-20">
                <button class="text-[20px] font-bold">Sports</button>
            
            </div>

    </div>




















<script  src="./tsdist/ssn.js"></script>
